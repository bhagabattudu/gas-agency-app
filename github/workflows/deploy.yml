// Data fetch karne ka naya tareeka
async function syncData() {
    try {
        // Yahan aap apni API ka link daal sakte hain
        const response = await fetch('https://api.jsonbin.io/v3/b/YOUR_BIN_ID'); 
        const cloudData = await response.json();
        _items = cloudData.record.consumers;
        VirtualList.render();
    } catch (e) {
        console.log("Offline mode: Using local storage");
    }
}
